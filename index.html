<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>个人记账本 - 云端账单助手</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f3f6fc; margin: 0; padding: 20px; color: #1e2a3e; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 20px 24px; margin-bottom: 24px; }
        .card-header { font-size: 1.5rem; font-weight: 600; margin-bottom: 16px; border-left: 5px solid #3b82f6; padding-left: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .btn { border: none; padding: 8px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; background: #eef2ff; color: #1e40af; transition: 0.2s; }
        .btn-primary { background: #3b82f6; color: white; box-shadow: 0 2px 6px rgba(59,130,246,0.3); }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-success { background: #dcfce7; color: #166534; }
        .btn-sm { padding: 4px 12px; font-size: 0.85rem; }
        input, select, .file-label { border: 1px solid #cbd5e1; border-radius: 40px; padding: 8px 16px; background: white; font-size: 0.9rem; }
        .file-label { display: inline-block; background: #f1f5f9; cursor: pointer; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        .stats-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between; }
        .stat-card { flex: 1; background: #f1f5f9; border-radius: 28px; padding: 16px; text-align: center; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: white; border-radius: 32px; padding: 32px; width: 320px; text-align: center; }
        .hidden { display: none; }
        .alert { background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 24px; margin: 10px 0; }
        .info { background: #e6f4ff; color: #0050b3; padding: 10px; border-radius: 24px; margin: 10px 0; font-size: 0.85rem; word-break: break-all; }
        .success { background: #dcfce7; color: #166534; padding: 10px; border-radius: 24px; margin: 10px 0; }
        .filter-bar { background: #f8fafc; padding: 15px; border-radius: 24px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.8rem; font-weight: 600; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 12px; color: white; font-weight: 500; z-index: 2000; transition: opacity 0.3s; max-width: 300px; }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-info { background: #3b82f6; }
        .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 16px; align-items: center; }
        .page-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; cursor: pointer; }
        .page-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 700px) { 
            .stats-grid { flex-direction: column; } 
            table, thead, tbody, th, td, tr { display: block; } 
            th { display: none; } 
            td { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 8px; } 
            td::before { content: attr(data-label); font-weight: 600; color: #64748b; }
            .filter-bar { flex-direction: column; align-items: stretch; } 
            .filter-group { width: 100%; }
            input, select { width: 100%; }
        }
        footer { text-align: center; font-size: 0.75rem; color: #64748b; margin-top: 30px; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.hidden { display: none; }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 90%;
            overflow-y: auto;
        }
        .modal-content h3 { margin-top: 0; }
        .modal-content div { margin-bottom: 12px; }
        .modal-content label { display: block; margin-bottom: 4px; font-weight: 500; }
        .modal-content input, .modal-content select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="loginPanel" class="login-overlay">
        <div class="login-box">
            <h2>📒 个人记账本</h2>
            <p>输入访问密码</p>
            <input type="password" id="passwordInput" placeholder="密码" style="width:100%; margin:10px 0">
            <button class="btn btn-primary" id="loginBtn" style="width:100%">登录</button>
            <div id="loginError" class="alert hidden"></div>
            <small style="display:block; margin-top:16px;">密码在环境变量中设置</small>
        </div>
    </div>
    <div id="mainApp" class="hidden">
        <div class="card">
            <div class="card-header">
                📊 个人记账仪表板
                <div style="display: flex; gap: 8px;">
                    <button id="quickAddBtn" class="btn btn-primary">➕ 快速记账</button>
                    <button id="exportBtn" class="btn btn-sm">📥 导出</button>
                    <button id="logoutBtn" class="btn btn-sm">🚪 退出</button>
                </div>
            </div>
            <div class="filter-bar">
                <div class="filter-group">
                    <label>年份</label>
                    <select id="yearFilter"><option value="">全部</option></select>
                </div>
                <div class="filter-group">
                    <label>月份</label>
                    <select id="monthFilter" disabled>
                        <option value="">全部</option>
                        <option value="01">1月</option>
                        <option value="02">2月</option>
                        <option value="03">3月</option>
                        <option value="04">4月</option>
                        <option value="05">5月</option>
                        <option value="06">6月</option>
                        <option value="07">7月</option>
                        <option value="08">8月</option>
                        <option value="09">9月</option>
                        <option value="10">10月</option>
                        <option value="11">11月</option>
                        <option value="12">12月</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>分类</label>
                    <select id="categoryFilter"><option value="">全部分类</option></select>
                </div>
                <div class="filter-group">
                    <label>对方名称</label>
                    <input type="text" id="counterpartyFilter" placeholder="输入对方名称" style="width: 150px;">
                </div>
                <button id="applyFilterBtn" class="btn btn-primary">筛选</button>
                <button id="resetFilterBtn" class="btn">重置</button>
            </div>
            <div class="stats-grid" id="statsSummary">
                <div class="stat-card">💰 总收入: <strong id="totalIncome">0.00</strong></div>
                <div class="stat-card">💸 总支出: <strong id="totalExpense">0.00</strong></div>
                <div class="stat-card">📈 结余: <strong id="balance">0.00</strong></div>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 10px;">
                <div style="flex:1; min-width: 250px;"><canvas id="categoryChart" width="400" height="300"></canvas></div>
                <div style="flex:2; min-width: 200px;"><h4>📌 支出类别占比</h4><div id="categoryLegend"></div></div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">📁 导入账单 (支持微信/支付宝/云闪付 XLSX/CSV)</div>
            <div class="flex-row">
                <select id="billTypeSelect">
                    <option value="wechat">微信支付账单</option>
                    <option value="alipay">支付宝账单</option>
                    <option value="unionpay">云闪付账单</option>
                </select>
                <label class="file-label">📂 选择文件 <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none"></label>
                <button id="uploadBtn" class="btn btn-primary">解析并预览</button>
                <div id="uploadLoading" class="loading hidden" style="margin-left: 10px;"></div>
            </div>
            <div id="errorDetail" class="hidden info"></div>
            <div id="previewArea" class="hidden" style="margin-top: 20px;">
                <h4>📋 新交易记录</h4>
                <div style="overflow-x: auto;"><table id="newItemsTable"><thead><tr><th>日期</th><th>类型</th><th>金额(元)</th><th>对方/备注</th><th>分类</th><th>来源</th></tr></thead><tbody></tbody></table></div>
                <h4>⚠️ 重复记录 (请勾选需要覆盖的条目)</h4>
                <div style="overflow-x: auto;"><table id="duplicatesTable"><thead><tr><th><input type="checkbox" id="selectAllDuplicates"></th><th>日期</th><th>类型</th><th>金额(元)</th><th>对方/备注</th><th>分类</th><th>来源</th><th>已有记录信息</th></tr></thead><tbody></tbody></table></div>
                <div class="flex-row" style="justify-content: flex-end; margin-top: 12px;">
                    <button id="confirmImportBtn" class="btn btn-primary">✅ 确认导入以上记录</button>
                    <button id="cancelPreviewBtn" class="btn">取消</button>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                📜 交易流水
                <div style="display: flex; gap: 8px; align-items: center;">
                    <span id="txLoading" class="loading hidden"></span>
                    <button id="refreshTxBtn" class="btn btn-sm">🔄 刷新</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="transactionsTable">
                    <thead><tr><th>日期</th><th>类型</th><th>金额</th><th>对方</th><th>分类</th><th>来源</th><th>操作</th></tr></thead>
                    <tbody><tr><td colspan="7">加载中...</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
        <footer>🔒 数据加密存储于Cloudflare D1 · 两阶段导入支持重复覆盖 · 自动分类 · 分页加载</footer>
    </div>
</div>

<!-- 快捷记账弹窗 -->
<div id="quickAddModal" class="modal hidden">
    <div class="modal-content">
        <h3>快速记账</h3>
        <form id="quickAddForm">
            <div>
                <label>类型</label>
                <select name="type" required>
                    <option value="expense">支出</option>
                    <option value="income">收入</option>
                </select>
            </div>
            <div>
                <label>金额</label>
                <input type="number" name="amount" step="0.01" required>
            </div>
            <div>
                <label>对方名称</label>
                <input type="text" name="counterparty" required>
            </div>
            <div>
                <label>日期</label>
                <input type="date" name="date" required>
            </div>
            <div>
                <label>分类</label>
                <select name="category" required>
                    <option value="餐饮">餐饮</option>
                    <option value="交通">交通</option>
                    <option value="购物">购物</option>
                    <option value="娱乐">娱乐</option>
                    <option value="人情往来">人情往来</option>
                    <option value="医疗">医疗</option>
                    <option value="住房">住房</option>
                    <option value="利息">利息</option>
                    <option value="退款">退款</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div>
                <label>备注</label>
                <input type="text" name="note">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" id="closeModalBtn" class="btn">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 全局变量
    let currentAuth = "";
    let chartInstance = null;
    let currentFilters = { year: '', month: '', category: '', counterparty: '' };
    let currentPage = 1;
    const pageSize = 50;
    let pendingCheckResult = null;

    // 辅助函数
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    async function apiFetch(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json', 'X-Auth-Password': currentAuth, ...(options.headers || {}) };
        try {
            const res = await fetch(endpoint, { ...options, headers });
            if (res.status === 401) { 
                showToast("登录已过期，请重新登录", "error"); 
                logout(); 
                throw new Error("Unauthorized"); 
            }
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "请求失败");
            return data;
        } catch (error) {
            showToast(error.message, "error");
            throw error;
        }
    }

    async function login(password) {
        try {
            const res = await fetch('/api/login', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ password }) 
            });
            const data = await res.json();
            if (res.ok && data.success) {
                currentAuth = password;
                localStorage.setItem("bill_auth", password);
                document.getElementById("loginPanel").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                initFilters();
                loadAllData();
                showToast("登录成功", "success");
                return true;
            } else { 
                document.getElementById("loginError").innerText = data.error || "密码错误"; 
                document.getElementById("loginError").classList.remove("hidden"); 
                return false; 
            }
        } catch(e) { 
            document.getElementById("loginError").innerText = "网络错误"; 
            document.getElementById("loginError").classList.remove("hidden"); 
            return false; 
        }
    }

    function logout() { 
        currentAuth = ""; 
        localStorage.removeItem("bill_auth"); 
        document.getElementById("loginPanel").classList.remove("hidden"); 
        document.getElementById("mainApp").classList.add("hidden"); 
        if(chartInstance) chartInstance.destroy(); 
    }

    async function loadAllData() { 
        await loadStats(currentFilters.year, currentFilters.month, currentFilters.category);
        await loadTransactions(currentFilters.year, currentFilters.month, currentFilters.category, currentFilters.counterparty, currentPage);
    }

    async function loadStats(year, month, category) {
        try {
            let url = "/api/stats";
            const params = new URLSearchParams();
            if (year) params.append('year', year);
            if (month) params.append('month', month);
            if (category) params.append('category', category);
            if (params.toString()) url += "?" + params.toString();

            const stats = await apiFetch(url);
            document.getElementById("totalIncome").innerText = parseFloat(stats.totalIncome).toFixed(2);
            document.getElementById("totalExpense").innerText = parseFloat(stats.totalExpense).toFixed(2);
            document.getElementById("balance").innerText = (parseFloat(stats.totalIncome) - parseFloat(stats.totalExpense)).toFixed(2);

            const categoryData = stats.expenseByCategory || {};
            const labels = Object.keys(categoryData);
            const values = Object.values(categoryData);
            const ctx = document.getElementById('categoryChart').getContext('2d');

            if (chartInstance) chartInstance.destroy();

            if (labels.length > 0) {
                chartInstance = new Chart(ctx, { 
                    type: 'pie', 
                    data: { 
                        labels: labels, 
                        datasets: [{ 
                            data: values, 
                            backgroundColor: ['#3b82f6','#f97316','#10b981','#f59e0b','#8b5cf6','#ec489a','#64748b','#f43f5e','#06b6d4','#a855f7'] 
                        }] 
                    }, 
                    options: { 
                        responsive: true, 
                        plugins: { 
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const label = context.label || '';
                                        const value = context.parsed || 0;
                                        const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                        const percentage = ((value / total) * 100).toFixed(1);
                                        return `${label}: ${value.toFixed(2)}元 (${percentage}%)`;
                                    }
                                }
                            }
                        } 
                    } 
                });
            }

            let legendHtml = '<ul style="list-style: none; padding: 0;">';
            const totalExpense = values.reduce((a, b) => a + b, 0);
            for(let i=0;i<labels.length;i++) {
                const percentage = totalExpense > 0 ? ((values[i] / totalExpense) * 100).toFixed(1) : 0;
                legendHtml += `<li style="margin: 8px 0; display: flex; justify-content: space-between; align-items: center;">
                    <span><span style="display: inline-block; width: 12px; height: 12px; background: ${chartInstance ? chartInstance.data.datasets[0].backgroundColor[i] : '#ccc'}; border-radius: 50%; margin-right: 8px;"></span>${labels[i]}</span>
                    <strong>${values[i].toFixed(2)}元 (${percentage}%)</strong>
                </li>`;
            }
            legendHtml += '</ul>';
            document.getElementById("categoryLegend").innerHTML = legendHtml || "暂无支出数据";
        } catch(e) { 
            console.error(e); 
        }
    }

    async function loadTransactions(year, month, category, counterparty, page = 1) {
        const loadingEl = document.getElementById("txLoading");
        loadingEl.classList.remove("hidden");

        try {
            const params = new URLSearchParams();
            if (year) params.append('year', year);
            if (month) params.append('month', month);
            if (category) params.append('category', category);
            if (counterparty) params.append('counterparty', counterparty);
            params.append('page', page);
            params.append('limit', pageSize);

            let url = "/api/transactions?" + params.toString();
            const result = await apiFetch(url);
            const txns = result.data || [];

            const tbody = document.querySelector("#transactionsTable tbody");
            if (!txns.length) { 
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 20px;">暂无交易记录</td></tr>`; 
                document.getElementById("pagination").innerHTML = '';
                return; 
            }

            tbody.innerHTML = "";
            for (let t of txns) {
                const row = tbody.insertRow();
                row.insertCell(0).setAttribute('data-label', '日期');
                row.cells[0].innerText = t.date;

                row.insertCell(1).setAttribute('data-label', '类型');
                row.cells[1].innerText = t.type === 'expense' ? '支出' : '收入';

                row.insertCell(2).setAttribute('data-label', '金额');
                row.cells[2].innerText = Math.abs(t.amount).toFixed(2);
                row.cells[2].style.color = t.type === 'expense' ? '#ef4444' : '#10b981';

                row.insertCell(3).setAttribute('data-label', '对方');
                row.cells[3].innerText = t.counterparty || '-';
                row.cells[3].title = t.note || '';

                const catCell = row.insertCell(4);
                catCell.setAttribute('data-label', '分类');
                const select = document.createElement("select");
                const categories = ['餐饮','交通','购物','娱乐','人情往来','医疗','住房','利息','退款','其他'];
                categories.forEach(cat => { 
                    const opt = document.createElement("option"); 
                    opt.value = cat; 
                    opt.innerText = cat; 
                    if (t.category === cat) opt.selected = true; 
                    select.appendChild(opt); 
                });
                select.style.borderRadius="30px"; 
                select.style.padding="4px";
                select.style.fontSize="0.85rem";
                select.onchange = async (e) => { 
                    const newCategory = e.target.value;
                    await apiFetch(`/api/transactions/${t.id}`, { 
                        method: 'PUT', 
                        body: JSON.stringify({ category: newCategory }) 
                    }); 
                    // 记录学习规则
                    await recordLearning(t.counterparty, newCategory);
                    showToast("分类已更新", "success");
                    loadStats(currentFilters.year, currentFilters.month, currentFilters.category); 
                };
                catCell.appendChild(select);

                row.insertCell(5).setAttribute('data-label', '来源');
                row.cells[5].innerText = t.source === 'wechat' ? '微信' : (t.source === 'alipay' ? '支付宝' : (t.source === 'unionpay' ? '云闪付' : '其他'));

                const actionCell = row.insertCell(6);
                actionCell.setAttribute('data-label', '操作');
                const delBtn = document.createElement("button");
                delBtn.innerText = "删除"; 
                delBtn.className = "btn btn-sm btn-danger";
                delBtn.onclick = async () => { 
                    if(confirm("确定删除此条记录?")) { 
                        await apiFetch(`/api/transactions/${t.id}`, { method: 'DELETE' }); 
                        showToast("记录已删除", "success");
                        loadAllData(); 
                    } 
                };
                actionCell.appendChild(delBtn);
            }

            renderPagination(result.pagination);
        } catch(e) { 
            console.error(e); 
        } finally {
            loadingEl.classList.add("hidden");
        }
    }

    function renderPagination(pagination) {
        const container = document.getElementById("pagination");
        if (!pagination || pagination.totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        let html = `<button class="page-btn" ${pagination.page <= 1 ? 'disabled' : ''} onclick="changePage(${pagination.page - 1})">上一页</button>`;

        for (let i = 1; i <= pagination.totalPages; i++) {
            if (i === 1 || i === pagination.totalPages || (i >= pagination.page - 2 && i <= pagination.page + 2)) {
                html += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            } else if (i === pagination.page - 3 || i === pagination.page + 3) {
                html += '<span>...</span>';
            }
        }

        html += `<button class="page-btn" ${pagination.page >= pagination.totalPages ? 'disabled' : ''} onclick="changePage(${pagination.page + 1})">下一页</button>`;
        html += `<span style="margin-left: 10px; color: #64748b;">共 ${pagination.total} 条</span>`;

        container.innerHTML = html;
    }

    document.getElementById("exportBtn").onclick = async () => {
        const format = confirm("点击确定导出CSV格式，取消导出JSON格式") ? 'csv' : 'json';
        let url = `/api/export?format=${format}`;
        if (currentFilters.year) url += `&year=${currentFilters.year}`;
        if (currentFilters.month) url += `&month=${currentFilters.month}`;

        try {
            const response = await fetch(url, {
                headers: { 'X-Auth-Password': currentAuth }
            });

            if (!response.ok) throw new Error("导出失败");

            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = `账单_${currentFilters.year || '全部'}${currentFilters.month || ''}.${format}`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);
            showToast("导出成功", "success");
        } catch (error) {
            showToast(error.message, "error");
        }
    };

    // ---------- 账单解析辅助函数 ----------
    function excelDateToJSDate(excelSerial) {
        const utcDays = excelSerial - 25569;
        const ms = utcDays * 86400000;
        const date = new Date(ms);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function normalizeDateValue(value) {
        if (!value) return '';
        if (typeof value === 'string' && (value.includes('-') || value.includes('/'))) {
            let parts = value.split(/[-/]/);
            if (parts.length === 3) {
                let year = parts[0];
                let month = parts[1].padStart(2, '0');
                let day = parts[2].padStart(2, '0');
                if (year.length === 2) year = '20' + year;
                return `${year}-${month}-${day}`;
            }
            return value;
        }
        if (typeof value === 'number' && value > 1 && value < 100000) {
            try { return excelDateToJSDate(value); } catch(e) { return value.toString(); }
        }
        return value.toString();
    }

    function getColumnValue(row, possibleNames, convertDate = false) {
        for (let name of possibleNames) {
            if (row[name] !== undefined) {
                let val = row[name];
                if (convertDate && (possibleNames.includes('交易时间') || possibleNames.includes('时间') || possibleNames.includes('日期'))) {
                    return normalizeDateValue(val);
                }
                return val;
            }
        }
        for (let key in row) {
            let normalizedKey = key.replace(/[\s\(\)（）,，、]/g, '').toLowerCase();
            for (let name of possibleNames) {
                let normalizedName = name.replace(/[\s\(\)（）,，、]/g, '').toLowerCase();
                if (normalizedKey === normalizedName) {
                    let val = row[key];
                    if (convertDate && (possibleNames.includes('交易时间') || possibleNames.includes('时间') || possibleNames.includes('日期'))) {
                        return normalizeDateValue(val);
                    }
                    return val;
                }
            }
        }
        return '';
    }

    function parseAmount(amountStr) {
        if (!amountStr) return 0;
        let cleaned = amountStr.toString().replace(/[^\d.-]/g, '');
        let amount = parseFloat(cleaned);
        return isNaN(amount) ? 0 : amount;
    }

    function parseWechatFromJson(rows, source) {
        const records = [];
        for (let row of rows) {
            let date = getColumnValue(row, ['交易时间', '时间', '日期'], true);
            if (!date) continue;
            let amountStr = getColumnValue(row, ['金额(元)', '金额', '交易金额'], false);
            let amount = parseAmount(amountStr);
            if (amount === 0) continue;

            let typeRaw = getColumnValue(row, ['收/支', '收支类型', '类型'], false);
            let isExpense = false;
            if (typeRaw) {
                isExpense = (typeRaw === '支出' || typeRaw === '支出/付款');
            } else {
                let transactionType = getColumnValue(row, ['交易类型', '类型'], false);
                if (amount < 0) isExpense = true;
                else {
                    if (transactionType.includes('消费') || transactionType.includes('付款') || transactionType.includes('充值')) isExpense = true;
                    else if (transactionType.includes('转账')) isExpense = (amount < 0);
                    else if (transactionType.includes('退款')) isExpense = false;
                    else isExpense = true;
                }
            }

            let counterparty = getColumnValue(row, ['交易对方', '对方', '商户名称'], false);
            let transactionType = getColumnValue(row, ['交易类型', '类型'], false);
            let goods = getColumnValue(row, ['商品', '商品说明'], false);
            let note = goods || transactionType;
            let transactionId = getColumnValue(row, ['交易单号', '商户单号', '交易号'], false);
            let category = transactionType || '其他';

            records.push({
                date: date,
                amount: Math.abs(amount),
                type: isExpense ? 'expense' : 'income',
                counterparty: counterparty,
                note: note,
                category: category,
                source: source,
                transactionId: transactionId
            });
        }
        return records;
    }

    function parseAlipayFromJson(rows, source) {
        const records = [];
        for (let row of rows) {
            let date = getColumnValue(row, ['交易时间', '时间', '日期'], true);
            if (!date) continue;
            let amountStr = getColumnValue(row, ['金额(元)', '金额', '交易金额'], false);
            let amount = parseAmount(amountStr);
            if (amount === 0) continue;

            let direction = getColumnValue(row, ['收/支', '收支类型'], false);
            let isExpense = (direction === '支出' || direction === '支出/付款');
            if (!direction && amount < 0) isExpense = true;
            if (!direction && amount > 0) isExpense = false;

            let counterparty = getColumnValue(row, ['交易对方', '对方', '商户名称', '商品说明'], false);
            let transCat = getColumnValue(row, ['交易分类', '分类'], false);
            let note = transCat;
            let transactionId = getColumnValue(row, ['交易订单号', '商户订单号', '交易号'], false);
            let category = transCat || '其他';

            records.push({
                date: date,
                amount: Math.abs(amount),
                type: isExpense ? 'expense' : 'income',
                counterparty: counterparty,
                note: note,
                category: category,
                source: source,
                transactionId: transactionId
            });
        }
        return records;
    }

    function parseUnionpayFromJson(rows, source) {
        const records = [];
        for (let row of rows) {
            let date = getColumnValue(row, ['交易时间', '时间', '日期'], true);
            if (!date) continue;
            let amountStr = getColumnValue(row, ['交易金额', '金额'], false);
            let amount = parseAmount(amountStr);
            if (amount === 0) continue;
            let isExpense = amount < 0;
            let counterparty = getColumnValue(row, ['交易对方', '对方', '商户名称', '商户名'], false);
            let transType = getColumnValue(row, ['交易类型', '类型'], false);
            let note = transType;
            let transactionId = getColumnValue(row, ['订单编号', '流水号'], false);
            let category = transType || '其他';

            records.push({
                date: date,
                amount: Math.abs(amount),
                type: isExpense ? 'expense' : 'income',
                counterparty: counterparty,
                note: note,
                category: category,
                source: source,
                transactionId: transactionId
            });
        }
        return records;
    }

    async function parseFile(file, billType) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = e.target.result;
                let rows = [];
                if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    rows = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
                } else {
                    const parsed = Papa.parse(data, { header: true, skipEmptyLines: true });
                    rows = parsed.data;
                }
                let records = [];
                if (billType === 'wechat') records = parseWechatFromJson(rows, 'wechat');
                else if (billType === 'alipay') records = parseAlipayFromJson(rows, 'alipay');
                else if (billType === 'unionpay') records = parseUnionpayFromJson(rows, 'unionpay');
                resolve(records);
            };
            reader.onerror = reject;
            if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                reader.readAsArrayBuffer(file);
            } else {
                reader.readAsText(file, 'UTF-8');
            }
        });
    }

    async function renderPreview(checkResult) {
        const { newItems, duplicates } = checkResult;

        const newTbody = document.querySelector("#newItemsTable tbody");
        newTbody.innerHTML = "";
        for (let t of newItems) {
            const row = newTbody.insertRow();
            row.insertCell(0).innerText = t.date;
            row.insertCell(1).innerText = t.type === 'expense' ? '支出' : '收入';
            row.insertCell(2).innerText = t.amount.toFixed(2);
            row.insertCell(3).innerText = (t.counterparty || '') + (t.note ? ' (' + t.note + ')' : '');
            const catCell = row.insertCell(4);
            const select = document.createElement("select");
            const categories = ['餐饮','交通','购物','娱乐','人情往来','医疗','住房','利息','退款','其他'];
            categories.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c;
                opt.innerText = c;
                if (t.category === c) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = (e) => {
                t.category = e.target.value;
                recordLearning(t.counterparty, e.target.value);
            };
            catCell.appendChild(select);
            row.insertCell(5).innerText = t.source === 'wechat' ? '微信' : (t.source === 'alipay' ? '支付宝' : '云闪付');
        }

        const dupTbody = document.querySelector("#duplicatesTable tbody");
        dupTbody.innerHTML = "";
        for (let d of duplicates) {
            const row = dupTbody.insertRow();
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "dup-checkbox";
            checkbox.value = d.existingId;
            checkbox.dataset.record = JSON.stringify(d);
            const cell0 = row.insertCell(0);
            cell0.appendChild(checkbox);
            row.insertCell(1).innerText = d.date;
            row.insertCell(2).innerText = d.type === 'expense' ? '支出' : '收入';
            row.insertCell(3).innerText = d.amount.toFixed(2);
            row.insertCell(4).innerText = (d.counterparty || '') + (d.note ? ' (' + d.note + ')' : '');
            const catCellDup = row.insertCell(5);
            const selectDup = document.createElement("select");
            const categoriesDup = ['餐饮','交通','购物','娱乐','人情往来','医疗','住房','利息','退款','其他'];
            categoriesDup.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c;
                opt.innerText = c;
                if (d.category === c) opt.selected = true;
                selectDup.appendChild(opt);
            });
            selectDup.onchange = (e) => {
                d.category = e.target.value;
                recordLearning(d.counterparty, e.target.value);
            };
            catCellDup.appendChild(selectDup);
            row.insertCell(6).innerText = d.source === 'wechat' ? '微信' : (d.source === 'alipay' ? '支付宝' : '云闪付');
            row.insertCell(7).innerHTML = `ID:${d.existingId} 日期:${d.existingDate} 金额:${d.existingAmount} 对方:${d.existingCounterparty} 分类:${d.existingCategory} 来源:${d.existingSource}<br><small>${d.duplicateReason}</small>`;
        }

        const selectAllCheckbox = document.getElementById("selectAllDuplicates");
        selectAllCheckbox.onclick = () => {
            const checkboxes = document.querySelectorAll(".dup-checkbox");
            checkboxes.forEach(cb => cb.checked = selectAllCheckbox.checked);
        };

        document.getElementById("previewArea").classList.remove("hidden");
    }

    async function confirmImport() {
        if (!pendingCheckResult) {
            showToast("没有待导入的数据", "error");
            return;
        }

        const { newItems, duplicates } = pendingCheckResult;
        const finalNewItems = newItems.map(item => ({ ...item }));
        const checkboxes = document.querySelectorAll(".dup-checkbox");
        const selectedOverwrites = [];
        for (let cb of checkboxes) {
            if (cb.checked) {
                const record = JSON.parse(cb.dataset.record);
                const row = cb.closest('tr');
                const select = row.cells[5].querySelector('select');
                record.category = select.value;
                selectedOverwrites.push(record);
            }
        }

        if (finalNewItems.length === 0 && selectedOverwrites.length === 0) {
            showToast("没有可导入的记录", "error");
            return;
        }

        const btn = document.getElementById("confirmImportBtn");
        btn.disabled = true;
        btn.innerText = "导入中...";

        try {
            const result = await apiFetch("/api/import/confirm", {
                method: 'POST',
                body: JSON.stringify({
                    newItems: finalNewItems,
                    overwrites: selectedOverwrites
                })
            });
            showToast(result.message, "success");
            document.getElementById("previewArea").classList.add("hidden");
            pendingCheckResult = null;
            loadAllData();
        } catch(e) {
            showToast("导入失败: " + e.message, "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "✅ 确认导入以上记录";
        }
    }

    async function handleFileUpload() {
        const fileInput = document.getElementById("fileInput");
        const file = fileInput.files[0];
        if (!file) { 
            showToast("请先选择文件", "error"); 
            return; 
        }

        const loadingEl = document.getElementById("uploadLoading");
        loadingEl.classList.remove("hidden");

        const billType = document.getElementById("billTypeSelect").value;
        try {
            const records = await parseFile(file, billType);
            if (records.length === 0) {
                const errorDiv = document.getElementById("errorDetail");
                errorDiv.classList.remove("hidden");
                errorDiv.innerHTML = "<strong>未解析到任何交易记录</strong><br>请检查：1. 是否选择了正确的账单类型 2. 文件格式是否正确";
                throw new Error("解析失败");
            }
            document.getElementById("errorDetail").classList.add("hidden");

            const checkResult = await apiFetch("/api/import/check", {
                method: 'POST',
                body: JSON.stringify({ transactions: records })
            });

            pendingCheckResult = checkResult;
            await renderPreview(checkResult);
            showToast(`解析成功，共 ${records.length} 条记录，其中新记录 ${checkResult.newItems.length} 条，重复 ${checkResult.duplicates.length} 条`, "success");
        } catch(err) {
            showToast("解析出错: " + err.message, "error");
        } finally {
            loadingEl.classList.add("hidden");
        }
    }
